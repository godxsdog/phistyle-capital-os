services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: phistyle_os
      POSTGRES_USER: phistyle
      POSTGRES_PASSWORD: phistyle
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://phistyle:phistyle@postgres:5432/phistyle_os
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
